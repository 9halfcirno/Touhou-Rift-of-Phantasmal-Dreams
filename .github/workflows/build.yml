name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build-exe:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      # ── Node.js 环境 ──────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      # ── 前端构建 ──────────────────────────────
      # tsc 类型检查；vite build --base ./ 输出相对路径，适配 Neutralinojs 内建服务器
      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Vite build
        run: npx vite build --base ./

      # ── Neutralinojs 环境 ──────────────────────
      - name: Install Neutralinojs CLI
        run: npm install -g @neutralinojs/neu

      - name: Create Neutralinojs project skeleton
        run: neu create thropd

      # ── 合并所有 web 资源到 resources/ ────────
      # Neutralinojs 要求所有前端文件都在 resources/ 目录下
      # Vite 产物 JS/CSS 在 dist/static/，游戏资源在 assets/ + definitions/，不再冲突
      - name: Merge web resources
        shell: pwsh
        run: |
          # 清空 neu create 生成的默认模板文件
          Remove-Item -Recurse -Force thropd/resources/* -ErrorAction SilentlyContinue

          # 1. Vite 构建产物（index.html + static/）
          if (-not (Test-Path dist)) {
            throw 'dist directory not found. Ensure Vite build succeeded.'
          }
          Copy-Item -Recurse dist/* thropd/resources/

          # 2. 游戏静态资源（assets/ + definitions/）
          # 注意：不再删除 thropd/resources/assets，因为 Vite 产物在 static/ 子目录下
          Remove-Item -Recurse -Force thropd/resources/definitions -ErrorAction SilentlyContinue
          Copy-Item -Recurse assets thropd/resources
          Copy-Item -Recurse definitions thropd/resources
          Copy-Item node_modules/@neutralinojs/lib/dist/neutralino.js thropd/resources/neutralino.js

      # ── Neutralinojs 配置 ──────────────────────
      - name: Configure Neutralinojs
        shell: pwsh
        run: |
          $config = @{
            applicationId   = "com.9halfcirno.thropd"
            defaultMode     = "window"
            port            = 0
            url             = "/resources/"
            enableServer    = $true
            enableNativeAPI = $true
            tokenSecurity   = "one-time"
            modes           = @{
              window = @{
                title               = "☯️东方幻梦裂隙 ~Touhou Rift of Phantasmal Dreams~"
                width               = 1280
                height              = 720
                minWidth            = 800
                minHeight           = 600
                fullScreen          = $false
                alwaysOnTop         = $false
                enableInspector     = $false
                exitProcessOnClose  = $true
              }
            }
            cli             = @{
              binaryName    = "thropd"
              resourcesPath = "/resources/"
            }
          }

          $config | ConvertTo-Json -Depth 5 | Set-Content thropd/neutralino.config.json

      # ── 注入 neutralino.js 脚本引用 ────────────
      - name: Inject neutralino.js into HTML
        shell: pwsh
        run: |
          if (-not (Test-Path thropd/resources/index.html)) {
            throw 'thropd/resources/index.html not found after merge.'
          }
          $html = Get-Content thropd/resources/index.html -Raw -Encoding UTF8
          $html = $html -replace '</head>', '<script src="./neutralino.js"></script></head>'
          [System.IO.File]::WriteAllText(
            (Resolve-Path thropd/resources/index.html).Path,
            $html,
            [System.Text.UTF8Encoding]::new($false)
          )

      # ── 打 包 ──────────────────────────────────
      - name: Build EXE
        run: |
          cd thropd
          neu build --release

      # ── 上传产物 ──────────────────────────────
      - uses: actions/upload-artifact@v4
        with:
          name: thropd-win64
          path: |
            thropd/dist/**/thropd-*.exe
            thropd/dist/**/thropd-*.zip
          if-no-files-found: error
