name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build-exe:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      # ── Node.js 环境 ──────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      # ── TypeScript 类型检查 ────────────────────
      - name: TypeScript check
        run: npx tsc --noEmit

      # ── ① neu create ──────────────────────────
      - name: Install Neutralinojs CLI
        run: npm install -g @neutralinojs/neu

      - name: Create Neutralinojs project skeleton
        run: neu create thropd

      # ── ② 覆盖 neutralino.config.json ────
      - name: Write Neutralinojs config
        shell: pwsh
        run: Copy-Item -Force _neutralino.config.json thropd/neutralino.config.json

      # ── ③ 清空模板 resources ──────────────────
      - name: Clear template resources
        shell: pwsh
        run: Remove-Item -Recurse -Force thropd/resources/* -ErrorAction SilentlyContinue

      # ── ④ Vite 构建（覆盖 outDir）─────────────
      - name: Vite build
        run: npx vite build --outDir thropd/resources --base ./

      # ── ⑤ 复制游戏资源 ────────────────────────
      - name: Copy game assets
        shell: pwsh
        run: |
          Copy-Item -Recurse assets thropd/resources
          Copy-Item -Recurse definitions thropd/resources
          Copy-Item node_modules/@neutralinojs/lib/dist/neutralino.js thropd/resources/neutralino.js

      # ── ⑥ neu build ───────────────────────────
      - name: Build Neutralinojs app
        run: |
          cd thropd
          neu build --release

      # ── 上传产物 ──────────────────────────────
      - uses: actions/upload-artifact@v4
        with:
          name: thropd-win64
          path: thropd/dist/**/thropd-*.zip
          if-no-files-found: error
