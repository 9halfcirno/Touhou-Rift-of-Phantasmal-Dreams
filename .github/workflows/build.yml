name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build-exe:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      # ── Node.js 环境 ──────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      # ── TypeScript 类型检查 ────────────────────
      - name: TypeScript check
        run: npx tsc --noEmit

      # ── ① neu create ──────────────────────────
      - name: Install Neutralinojs CLI
        run: npm install -g @neutralinojs/neu

      - name: Create Neutralinojs project skeleton
        run: neu create thropd

      # ── ② 硬编码写入 neutralino.config.json ────
      - name: Write Neutralinojs config
        shell: pwsh
        run: |
          $config = @{
            '$schema'        = 'https://raw.githubusercontent.com/neutralinojs/neutralinojs/main/schemas/neutralino.config.schema.json'
            applicationId    = 'com.9halfcirno.thropd'
            version          = '1.0.0'
            defaultMode      = 'window'
            port             = 0
            documentRoot     = '/resources/'
            url              = '/'
            enableServer     = $true
            enableNativeAPI  = $true
            tokenSecurity    = 'one-time'
            logging          = @{
              enabled       = $true
              writeToLogFile = $true
            }
            nativeAllowList  = @('app.*', 'os.*', 'debug.log')
            globalVariables  = @{}
            modes            = @{
              window = @{
                title              = '东方幻梦裂隙 ~Touhou Rift of Phantasmal Dreams~'
                width              = 800
                height             = 500
                minWidth           = 400
                minHeight          = 200
                center             = $true
                fullScreen         = $false
                alwaysOnTop        = $false
                icon               = '/resources/assets/icon.png'
                enableInspector    = $true
                borderless         = $false
                maximize           = $false
                hidden             = $false
                resizable          = $true
                exitProcessOnClose = $true
              }
            }
            cli              = @{
              binaryName     = 'thropd'
              resourcesPath  = '/resources/'
              extensionsPath = '/extensions/'
              clientLibrary  = '/resources/neutralino.js'
              binaryVersion  = '6.8.0'
              clientVersion  = '6.8.0'
            }
          }
          $config | ConvertTo-Json -Depth 5 | Set-Content thropd/neutralino.config.json

      # ── ③ 清空模板 resources ──────────────────
      - name: Clear template resources
        shell: pwsh
        run: Remove-Item -Recurse -Force thropd/resources/* -ErrorAction SilentlyContinue

      # ── ④ Vite 构建（覆盖 outDir）─────────────
      - name: Vite build
        run: npx vite build --outDir thropd/resources --base ./

      # ── ⑤ 复制游戏资源 ────────────────────────
      - name: Copy game assets
        shell: pwsh
        run: |
          Copy-Item -Recurse assets thropd/resources
          Copy-Item -Recurse definitions thropd/resources
          Copy-Item node_modules/@neutralinojs/lib/dist/neutralino.js thropd/resources/neutralino.js

      # ── ⑥ neu build ───────────────────────────
      - name: Build Neutralinojs app
        run: |
          cd thropd
          neu build

      # ── 上传产物 ──────────────────────────────
      - uses: actions/upload-artifact@v4
        with:
          name: thropd-win64
          path: |
            thropd/dist/**/thropd-*.exe
            thropd/dist/**/thropd-*.zip
          if-no-files-found: error
